[package]
name = "flight-examples-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
example-drawingshapes = { path = "../../crates/drawingshapes" }
wasm-bindgen = "0.2"

[dependencies.web-sys]
version = "0.3"
features = [
  "CanvasRenderingContext2d",
  "Document",
  "Element",
  "HtmlCanvasElement",
  "HtmlElement",
  "Node",
  "Window",
]

[lints]
workspace = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
