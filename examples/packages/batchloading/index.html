<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Batch Loading</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 32px;
        min-height: 100vh;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 24px;
        font-size: 1.5rem;
        font-weight: 600;
      }
      #status {
        font-size: 0.95rem;
        color: #a0aec0;
        margin-bottom: 16px;
        min-height: 1.4em;
      }
      #progress-bar-wrap {
        background: #2d3748;
        border-radius: 6px;
        height: 12px;
        overflow: hidden;
        margin-bottom: 24px;
        width: 100%;
        max-width: 480px;
      }
      #progress-bar {
        height: 100%;
        background: #63b3ed;
        border-radius: 6px;
        transition: width 0.12s ease;
        width: 0%;
      }
      #items {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 480px;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #2d3748;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 0.9rem;
      }
      .item-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        background: #4a5568;
        transition: background 0.15s;
      }
      .item-dot.running {
        background: #f6ad55;
      }
      .item-dot.loaded {
        background: #68d391;
      }
      .item-dot.failed {
        background: #fc8181;
      }
      .item-dot.cancelled {
        background: #a0aec0;
      }
      .item-name {
        flex: 1;
      }
      .item-detail {
        color: #718096;
        font-size: 0.82rem;
      }
      #controls {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
      }
      button {
        padding: 7px 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 500;
        transition: opacity 0.15s;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      #btn-start {
        background: #4299e1;
        color: #fff;
      }
      #btn-pause {
        background: #ecc94b;
        color: #1a1a2e;
      }
      #btn-resume {
        background: #68d391;
        color: #1a1a2e;
      }
      #btn-cancel {
        background: #fc8181;
        color: #1a1a2e;
      }
      #btn-reset {
        background: #b794f4;
        color: #1a1a2e;
      }
      #images {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 24px;
      }
      #images img {
        max-width: 160px;
        max-height: 160px;
        border-radius: 4px;
        border: 2px solid #4a5568;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <h1>Batch Loading</h1>
    <div id="status">Ready. Press Start to begin loading.</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="controls">
      <button id="btn-start">Start</button>
      <button id="btn-pause" disabled>Pause</button>
      <button id="btn-resume" disabled>Resume</button>
      <button id="btn-cancel" disabled>Cancel</button>
      <button id="btn-reset" disabled>Reset</button>
    </div>
    <div id="items"></div>
    <div id="images"></div>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
