[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["FlightHQ Contributors"]

[workspace.dependencies]
# Internal crates
flighthq-types = { path = "crates/flighthq-types" }
flighthq-entity = { path = "crates/flighthq-entity" }
flighthq-math = { path = "crates/flighthq-math" }
flighthq-geometry = { path = "crates/flighthq-geometry" }
flighthq-node = { path = "crates/flighthq-node" }
flighthq-signals = { path = "crates/flighthq-signals" }
flighthq-log = { path = "crates/flighthq-log" }
flighthq-clip = { path = "crates/flighthq-clip" }
flighthq-path = { path = "crates/flighthq-path" }
flighthq-shape = { path = "crates/flighthq-shape" }
flighthq-displayobject = { path = "crates/flighthq-displayobject" }
flighthq-sprite = { path = "crates/flighthq-sprite" }
flighthq-scene = { path = "crates/flighthq-scene" }
flighthq-mesh = { path = "crates/flighthq-mesh" }
flighthq-lighting = { path = "crates/flighthq-lighting" }
flighthq-texture = { path = "crates/flighthq-texture" }
flighthq-camera = { path = "crates/flighthq-camera" }
flighthq-scene-gl = { path = "crates/flighthq-scene-gl" }
flighthq-scene-wgpu = { path = "crates/flighthq-scene-wgpu" }
flighthq-velocity = { path = "crates/flighthq-velocity" }
flighthq-render = { path = "crates/flighthq-render" }
flighthq-render-gl = { path = "crates/flighthq-render-gl" }
flighthq-render-wgpu = { path = "crates/flighthq-render-wgpu" }
flighthq-displayobject-gl = { path = "crates/flighthq-displayobject-gl" }
flighthq-displayobject-wgpu = { path = "crates/flighthq-displayobject-wgpu" }
flighthq-displayobject-skia = { path = "crates/flighthq-displayobject-skia" }
flighthq-filters = { path = "crates/flighthq-filters" }
flighthq-filters-gl = { path = "crates/flighthq-filters-gl" }
flighthq-filters-wgpu = { path = "crates/flighthq-filters-wgpu" }
