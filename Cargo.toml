flighthq-resources-loader = { path = "crates/flighthq-resources-loader" }
flighthq-tween = { path = "crates/flighthq-tween" }
flighthq-tween-easing = { path = "crates/flighthq-tween-easing" }
flighthq-timeline = { path = "crates/flighthq-timeline" }
