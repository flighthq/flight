flighthq-haptics = { path = "crates/flighthq-haptics" }
flighthq-share = { path = "crates/flighthq-share" }
flighthq-statusbar = { path = "crates/flighthq-statusbar" }
flighthq-sdk = { path = "crates/flighthq-sdk" }
flighthq-capture = { path = "crates/flighthq-capture" }

# External crates
slotmap = "1"
glow = "0.14"
wgpu = { version = "22", default-features = false, features = ["wgsl"] }
tiny-skia = "0.11"
ttf-parser = "0.20"
bitflags = "2"
log = "0.4"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
serial_test = "3"
