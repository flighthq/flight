name: Nightly quality

# Per-PR CI (tests.yml) already gates the TypeScript build/test/quality/size and render
# smoke/parity legs on every PR — so nightly does NOT repeat them. Nightly holds only work
# that does not belong on the PR path: full coverage thresholds and API-surface generation.
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage

  api:
    name: API generation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run api
      - run: npm run api:json
