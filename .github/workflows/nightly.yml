name: Nightly quality

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  full-check:
    name: Full build and quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build:check
      - run: npm run build
      - run: npm run check
      - run: npm run test

  coverage:
    name: Coverage thresholds
    needs: full-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage

  api:
    name: API generation
    needs: full-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run api
      - run: npm run api:json
