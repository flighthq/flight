name: CI

# The per-commit gate for every PR and for pushes to main/develop. A `changes` job
# (dorny/paths-filter) decides whether a change touches code at all, so a docs-only PR
# resolves to "skipped" — a fast success that still reports to branch protection, so these
# checks are safe to mark required (unlike a whole-workflow path-skip, which never reports
# and leaves a required check stuck "Expected — Waiting for status").
#
# Nightly (nightly.yml) runs what does NOT belong on the PR path: full coverage thresholds
# and API-surface generation.

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # All-except filter: a change triggers the code legs unless it only touches docs,
          # so a newly added file type still triggers the legs by default.
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!tools/agents/docs/**'

  build-check:
    name: Build preflight
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build:check

  # build / test / quality / size / render all `needs: build-check`; when build-check is skipped
  # (docs-only change) they skip with it, so the `code` gate only needs stating once.
  build:
    name: Build & emit
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  harness-build:
    name: Harness build · ${{ matrix.label }}
    needs: build-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: functional
            check: build:functional
          - label: examples
            check: build:examples

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run ${{ matrix.check }}

  test:
    name: TypeScript tests · ${{ matrix.label }}
    needs: build-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: unit
            suite: test:unit

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run ${{ matrix.suite }}

  quality:
    name: TypeScript quality
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run check

  size:
    name: Bundle size
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run size

  render-test:
    # One leg per (subject × check) so a failure isolates both which tool and which kind of failure —
    # e.g. parity failing while smoke passes means the backends disagree, not that rendering is broken.
    # Environment-independent checks only: smoke (Tiers 1/2/4) and parity (cross-backend, Tier 3). The
    # regression check (Tier 5) is environment-coupled to its committed fingerprint baselines, so it is
    # excluded here; run `npm run test:regression` where the baselines were captured.
    name: Render · ${{ matrix.label }}
    needs: build-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: functional · smoke
            check: test:functional:smoke
          - label: functional · parity
            check: test:functional:parity
          - label: examples · smoke
            check: test:examples:smoke
          - label: examples · parity
            check: test:examples:parity

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      # The parity check imports the SDK from built dist (@flighthq/surface); building is harmless
      # for the smoke check (which resolves packages from source via the dev server).
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run ${{ matrix.check }}
