name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  build-check:
    name: Build preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build:check

  build:
    name: Build and emit
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    name: Test suites
    needs: build-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - test:unit
          - test:integration
          - test:api:node
          - test:api:browser

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run ${{ matrix.suite }}

  quality:
    name: Quality checks
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run check

  size:
    name: Size check
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run size

  render-verify:
    name: Render verification
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      # The verifier imports the SDK from built dist (@flighthq/surface, @flighthq/math).
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      # Environment-independent render gate: errors + not-blank (Tier 1/2) and cross-backend
      # differential (Tier 3). Tier 5 fingerprint regression is environment-coupled and excluded here
      # (--no-regression); run `npm run verify:render` where the baselines were captured.
      - run: npm run verify
