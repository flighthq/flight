name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  build-check:
    name: Build preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build:check

  build:
    name: Build and emit
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    name: Test suites
    needs: build-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - test:unit
          - test:integration
          - test:api:node
          - test:api:browser

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run ${{ matrix.suite }}

  quality:
    name: Quality checks
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run check

  size:
    name: Size check
    needs: build-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run size

  render-test:
    # One leg per (subject × check) so a failure isolates both which tool and which kind of failure —
    # e.g. parity failing while smoke passes means the backends disagree, not that rendering is broken.
    # Environment-independent checks only: smoke (Tiers 1/2/4) and parity (cross-backend, Tier 3). The
    # regression check (Tier 5) is environment-coupled to its committed fingerprint baselines, so it is
    # excluded here; run `npm run test:regression` where the baselines were captured.
    name: Render test (${{ matrix.check }})
    needs: build-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - test:functional:smoke
          - test:functional:parity
          - test:explorer:smoke
          - test:explorer:parity

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      # The parity check imports the SDK from built dist (@flighthq/surface); building is harmless
      # for the smoke check (which resolves packages from source via the dev server).
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run ${{ matrix.check }}
