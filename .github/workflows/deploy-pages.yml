name: Deploy Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'agents/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:site
        env:
          # Custom domain (flighthq.ai) serves at the root, so the site builds with base "/" and emits
          # a CNAME into the artifact. For a project-page deploy instead, use PAGES_BASE: /<repo>/ and
          # drop PAGES_CNAME.
          PAGES_BASE: /
          PAGES_CNAME: flighthq.ai
      - uses: actions/upload-pages-artifact@v3
        with:
          path: tools/site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
