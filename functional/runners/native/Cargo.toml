[package]
name = "flighthq-functional"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Flight Rust functional/visual harness: render scenes headlessly and gate them for regression (vs committed fingerprints) and parity (vs TS baselines)"

[dependencies]
# The skia/gl/wgpu render plumbing and the RenderTarget switch live in the shared
# harness crate now; this crate keeps only the wgpu + effects capture path (its
# baselines and TS-parity concern) plus the fingerprint/regression machinery.
flighthq-harness = { workspace = true }
flighthq-capture = { workspace = true }
flighthq-displayobject = { workspace = true }
flighthq-displayobject-wgpu = { workspace = true }
flighthq-effects = { workspace = true }
flighthq-effects-wgpu = { workspace = true }
flighthq-render = { workspace = true }
flighthq-render-wgpu = { workspace = true }
flighthq-shape = { workspace = true }
flighthq-path = { workspace = true }
flighthq-surface = { workspace = true }
flighthq-types = { workspace = true }
serde_json = "1"
wgpu = { workspace = true }

[[bin]]
name = "flighthq-functional"
path = "src/main.rs"
