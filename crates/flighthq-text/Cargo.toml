[package]
name = "flighthq-text"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Text display objects: single-format TextLabel and multi-format RichText built on the text-layout spine"

[dependencies]
flighthq-displayobject = { workspace = true }
flighthq-text-layout = { workspace = true }
flighthq-types = { workspace = true }

[dev-dependencies]
