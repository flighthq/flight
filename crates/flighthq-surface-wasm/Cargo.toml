[package]
name = "flighthq-surface-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "wasm-bindgen bindings for flighthq-surface; backs the @flighthq/surface-rs npm shim"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
flighthq-surface = { workspace = true }
flighthq-types = { workspace = true }
wasm-bindgen = "0.2"

# The Rust wasm32 target emits bulk-memory ops (memory.copy/fill) that the
# wasm-opt bundled with wasm-pack cannot validate, so optimization is left off.
# A newer binaryen can be wired in later to shrink the artifact further.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lints]
workspace = true
